play:"flex",flexDirection:"column",gap:10,marginBottom:20}}>{top4.map((p,i)=>(<Card key={i} style={{border:`1px solid ${i===0?C.gold:C.border}`,boxShadow:i===0?`0 0 30px ${C.gold}44`:"none"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:28}}>{["🥇","🥈","🥉","🏅"][i]}</div><Avatar emoji={p.playerEmoji} color={p.playerColor} size={44}/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:16}}>{p.nom}</div><div style={{color:C.textSm,fontSize:12,marginTop:2}}>por {p.playerName}</div></div><div style={{background:i===0?C.gold+"33":"rgba(255,255,255,0.08)",border:`1px solid ${i===0?C.gold:C.border}`,borderRadius:10,padding:"6px 12px",textAlign:"center"}}><div style={{fontWeight:800,fontSize:18,color:i===0?C.gold:C.text}}>{p.votes}</div><div style={{fontSize:10,color:C.textSm}}>votos</div></div></div></Card>))}</div><Card className="fadeIn" style={{marginBottom:16}}><div style={{fontWeight:700,marginBottom:10}}>👥 Jugadores</div><PlayersList players={players} hostId={roomData?.hostId}/></Card><div style={{display:"flex",flexDirection:"column",gap:10}}><Btn size="lg" variant="gold" style={{width:"100%"}} onClick={shareResult}>{shared?"✅ ¡Copiado!":"📤 Compartir resultado"}</Btn>{isHost&&(<Btn size="lg" variant="secondary" style={{width:"100%"}} onClick={playAgain}>🔄 Jugar otra ronda</Btn>)}</div></div></div>);}
function FullscreenCenter({children}){return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 50% 0%, ${C.purple}22 0%, transparent 60%), ${C.bg}`,padding:20}}><GlobalStyles/>{children}</div>);}
function RomaRush(){const myId=getMyPlayerId();const[roomCode,setRoomCode]=useState(null);const[roomData,setRoomData]=useState(null);const[chatOpen,setChatOpen]=useState(false);const[unread,setUnread]=useState(0);const prevChatLen=useRef(0);useEffect(()=>{if(!roomCode)return;const ref=window.db.ref(`rooms/${roomCode}`);ref.on("value",snap=>{setRoomData(snap.val());});return()=>ref.off();},[roomCode]);useEffect(()=>{const params=new URLSearchParams(window.location.search);const sala=params.get("sala");if(sala)setRoomCode(sala.toUpperCase());},[]);useEffect(()=>{if(!roomData?.chat)return;const len=Object.keys(roomData.chat).length;if(!chatOpen&&len>prevChatLen.current){setUnread(u=>u+(len-prevChatLen.current));}prevChatLen.current=len;},[roomData?.chat,chatOpen]);async function createRoom(name,emoji,color){const code=genRoomCode();await window.db.ref(`rooms/${code}`).set({phase:PHASE.LOBBY,hostId:myId,tema:"",revealIdx:-1,createdAt:Date.now(),players:{[myId]:{pid:myId,name,emoji,color,joinedAt:Date.now()}}});window.history.pushState({},"",`?sala=${code}`);setRoomCode(code);}async function joinRoom(code,name,emoji,color){const snap=await window.db.ref(`rooms/${code}`).once("value");if(!snap.exists())return{error:"Sala no encontrada 😅"};const data=snap.val();const playerCount=Object.keys(data.players||{}).length;if(playerCount>=8)return{error:"La sala está llena (máx 8)"};await window.db.ref(`rooms/${code}/players/${myId}`).set({pid:myId,name,emoji,color,joinedAt:Date.now()});window.history.pushState({},"",`?sala=${code}`);setRoomCode(code);return{};}const isHost=roomData?.hostId===myId;const phase=roomData?.phase||PHASE.HOME;const players=roomData?.players||{};const myPlayer=players[myId];if(!roomCode||(!roomData&&roomCode)){if(roomCode&&!roomData){return(<FullscreenCenter><div style={{textAlign:"center"}}><Spinner/><div style={{marginTop:12,color:C.textSm}}>Conectando...</div></div></FullscreenCenter>);}return<HomeScreen onCreateRoom={createRoom} onJoinRoom={joinRoom}/>;}if(roomData&&!myPlayer&&phase!==PHASE.HOME){return<HomeScreen onCreateRoom={createRoom} onJoinRoom={async(code,name,emoji,color)=>{const res=await joinRoom(code,name,emoji,color);return res;}}/>;}const ChatBtn=(<button onClick={()=>{setChatOpen(o=>!o);setUnread(0);}} style={{position:"fixed",bottom:20,right:20,zIndex:100,width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.pink})`,border:"none",cursor:"pointer",fontSize:22,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>💬{unread>0&&(<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>)}</button>);const ChatOverlay=chatOpen&&(<div style={{position:"fixed",bottom:80,right:16,zIndex:200,width:300,height:420,background:"#1A1033",border:`1px solid ${C.border}`,borderRadius:20,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.7)",display:"flex",flexDirection:"column"}}><div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:14}}>💬 Chat</span><button onClick={()=>setChatOpen(false)} style={{background:"none",border:"none",color:C.textSm,cursor:"pointer",fontSize:18}}>×</button></div><ChatPanel roomCode={roomCode} myId={myId} myName={myPlayer?.name||"?"} myEmoji={myPlayer?.emoji||"😎"} myColor={myPlayer?.color||C.purple}/></div>);const renderPhase=()=>{switch(phase){case PHASE.LOBBY:return(<LobbyScreen roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost} onStart={()=>window.db.ref(`rooms/${roomCode}`).update({phase:PHASE.TEMA})}/>);case PHASE.TEMA:return<TemaScreen roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost}/>;case PHASE.NOMINAR:return<NominarScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;case PHASE.ARGUMENTOS:return<ArgumentosScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;case PHASE.REVEAL:return<RevealScreen roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost}/>;case PHASE.VETO:return<VetoScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;case PHASE.VOTAR:return<VotarScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;case PHASE.FINAL:return<FinalScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;default:return<HomeScreen onCreateRoom={createRoom} onJoinRoom={joinRoom}/>;}};return(<>{renderPhase()}{ChatBtn}{ChatOverlay}</>);}
ReactDOM.createRoot(document.getElementById("root")).render(<RomaRush/>);
    </script>
