function getBotPicksForTema(tema) {
  const temaLower = tema.toLowerCase();
  for (const [key, picks] of Object.entries(BOT_PICKS_DB)) {
    const regex = new RegExp(key, 'i');
    if (regex.test(temaLower)) {
      return [...picks].sort(() => Math.random() - 0.5);
    }
  }
  return [...BOT_PICKS_DB.default].sort(() => Math.random() - 0.5);
}

function generateBotPicks(tema) {
  return getBotPicksForTema(tema).slice(0, 4);
}

function Btn({ children, onClick, variant="primary", disabled, style={}, size="md" }) {
  const pad   = size==="sm" ? "8px 16px" : size==="lg" ? "14px 32px" : "11px 24px";
  const fsize = size==="sm" ? 13 : size==="lg" ? 17 : 15;
  const base = {
    border:"none", borderRadius:12, fontWeight:700, cursor:disabled?"not-allowed":"pointer",
    padding:pad, fontSize:fsize, transition:"all 0.15s", display:"inline-flex",
    alignItems:"center", gap:8, justifyContent:"center", opacity:disabled?0.45:1,
  };
  const variants = {
    primary:  { background:`linear-gradient(135deg,${C.purple},${C.pink})`, color:"#fff" },
    secondary:{ background:"rgba(255,255,255,0.08)", color:C.text, border:`1px solid ${C.border}` },
    danger:   { background:`linear-gradient(135deg,${C.red},#b91c1c)`, color:"#fff" },
    ghost:    { background:"transparent", color:C.textMd, border:`1px solid ${C.border}` },
    gold:     { background:`linear-gradient(135deg,${C.gold},#d97706)`, color:"#000" },
  };
  return (
    <button style={{...base,...variants[variant],...style}} onClick={disabled?undefined:onClick}
      onMouseEnter={e=>{ if(!disabled) e.currentTarget.style.transform="scale(1.03)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; }}>
      {children}
    </button>
  );
}

function CircleTimer({ total, remaining, size=56, stroke=5 }) {
  const r   = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct  = remaining / total;
  const col  = pct > 0.5 ? C.green : pct > 0.25 ? C.gold : C.red;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 1s linear, stroke 0.3s"}}/>
      <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle" fill={col}
        fontSize={size*0.28} fontWeight="700" style={{transform:"rotate(90deg)",transformOrigin:"center"}}>
        {remaining}
      </text>
    </svg>
  );
}

// ─── CHAT PANEL ───────────────────────────────────────────────────
function ChatPanel({ roomCode, myId, myName, myEmoji, myColor }) {
  const [msg, setMsg] = useState("");
  const [msgs, setMsgs] = useState([]);
  const [reactionBurst, setReactionBurst] = useState([]);
  const bottomRef = useRef(null);

  useEffect(() => {
    const ref = window.db.ref(`rooms/${roomCode}/chat`);
    ref.limitToLast(60).on("value", snap => {
      const data = snap.val() || {};
      const arr = Object.values(data).sort((a,b) => a.ts - b.ts);
      setMsgs(arr);
    });
    return () => ref.off();
  }, [roomCode]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [msgs]);

  function sendMsg(e) {
    e?.preventDefault();
    const txt = msg.trim();
    if (!txt) return;
    window.db.ref(`rooms/${roomCode}/chat/${pushId()}`).set({
      pid:myId, name:myName, emoji:myEmoji, color:myColor, text:txt, ts:Date.now(), type:"msg"
    });
    setMsg("");
  }

  function sendReaction(emoji) {
    window.db.ref(`rooms/${roomCode}/chat/${pushId()}`).set({
      pid:myId, name:myName, emoji:myEmoji, color:myColor, text:emoji, ts:Date.now(), type:"reaction"
    });
    const id = Date.now();
    setReactionBurst(prev => [...prev, {id, emoji}]);
    setTimeout(() => setReactionBurst(prev => prev.filter(r => r.id !== id)), 1500);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      {/* Reaction burst */}
      <div style={{position:"absolute",top:0,left:0,right:0,pointerEvents:"none",zIndex:10}}>
        {reactionBurst.map(r => (
          <div key={r.id} style={{
            position:"absolute",left:"50%",top:0,fontSize:32,
            animation:"popIn 0.3s ease, confettiFall 1.2s 0.3s ease-in both",
            transform:"translateX(-50%)"
          }}>{r.emoji}</div>
        ))}
      </div>

      {/* Reaction bar */}
      <div style={{display:"flex",gap:6,padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
        {REACTIONS.map(r => (
          <button key={r.emoji} onClick={()=>sendReaction(r.emoji)} style={{
            background:"rgba(255,255,255,0.06)", border:`1px solid ${C.border}`,
            borderRadius:8, padding:"5px 8px", fontSize:16, cursor:"pointer",
            transition:"transform 0.1s"
          }}
          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.2)"}
          onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}
          >{r.emoji}</button>
        ))}
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
        {msgs.length === 0 && (
          <div style={{color:C.textSm, fontSize:13, textAlign:"center", marginTop:16}}>
            Sé el primero en escribir algo 💬
          </div>
        )}
        {msgs.map((m,i) => (
          <div key={i} className="fadeIn" style={{
            display:"flex", gap:8, alignItems:"flex-start",
            flexDirection: m.pid===myId ? "row-reverse" : "row"
          }}>
            {m.type==="reaction"
              ? <div style={{width:"100%",textAlign:"center",fontSize:22}}>{m.text}</div>
              : (
                <>
                  <Avatar emoji={m.emoji} color={m.color} size={28}/>
                  <div>
                    <div style={{
                      background: m.pid===myId ? C.purple+"44" : "rgba(255,255,255,0.08)",
                      borderRadius:12, padding:"7px 12px", maxWidth:200, fontSize:13
                    }}>{m.text}</div>
                    <div style={{color:C.textSm, fontSize:10, marginTop:2,
                      textAlign: m.pid===myId?"right":"left"}}>{m.name}</div>
                  </div>
                </>
              )
            }
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <form onSubmit={sendMsg} style={{
        display:"flex",gap:6,padding:"10px 12px",borderTop:`1px solid ${C.border}`
      }}>
        <input
          value={msg} onChange={e=>setMsg(e.target.value)}
          placeholder="Escribe algo..."
          style={{
            flex:1, background:"rgba(255,255,255,0.07)", border:`1px solid ${C.border}`,
            borderRadius:10, padding:"8px 12px", color:C.text, fontSize:13, outline:"none"
          }}
          maxLength={200}
        />
        <Btn size="sm" onClick={sendMsg} disabled={!msg.trim()}>➤</Btn>
      </form>
    </div>
  );
}

// ─── PLAYERS LIST ─────────────────────────────────────────────────
function PlayersList({ players, hostId }) {
  const list = Object.values(players || {}).sort((a,b) => a.joinedAt - b.joinedAt);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {list.map(p => (
        <div key={p.pid||p.name} style={{
          display:"flex", alignItems:"center", gap:10,
          background:"rgba(255,255,255,0.05)", borderRadius:12, padding:"10px 14px"
        }}>
          <Avatar emoji={p.emoji} color={p.color} size={36}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600, fontSize:14}}>{p.name}</div>

            {p.isBot && <Tag color="#6366F1">Bot 🤖</Tag>}

    </div>
  );
}

// ─── ACCORDION PANEL ────────────────────────────────────────────
function AccordionPanel({ icon, title, children, defaultOpen=false, style={} }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{
      background:"rgba(255,255,255,0.05)", border:`1px solid ${C.border}`,
      borderRadius:14, overflow:"hidden", ...style
    }}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"12px 16px", background:"transparent", border:"none",
        cursor:"pointer", color:C.text
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{icon}</span>
          <span style={{fontWeight:700,fontSize:14}}>{title}</span>
        </div>
        <span style={{
          fontSize:12, color:C.textSm, transform:open?"rotate(180deg)":"rotate(0deg)",
          transition:"transform 0.2s", display:"inline-block"
        }}>▼</span>
      </button>
      {open && (
        <div style={{padding:"0 16px 14px 16px"}} className="fadeIn">
          {children}

      )}
    </div>
  );
}

  function copyLink() {
    navigator.clipboard.writeText(shareUrl).then(() => {
      setCopied(true);

  return (
    <div style={{

        {/* Header */}
        <div className="fadeIn" style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:6}}>🏔️ ROMA RUSH</div>
          <div style={{
            display:"inline-flex",alignItems:"center",gap:10,
            background:"rgba(255,255,255,0.08)",borderRadius:14,padding:"10px 20px",
            border:`1px solid ${C.border}`
          }}>
            <span style={{color:C.textSm,fontSize:13}}>Código de sala:</span>
            <span style={{fontSize:22,fontWeight:900,letterSpacing:4,color:C.purpleLt}}>{roomCode}</span>
          </div>

        {/* Share link — only show if there are open real player slots */}

        <Card style={{marginBottom:16}} className="fadeIn">
          <div style={{color:C.textMd,fontSize:13,fontWeight:600,marginBottom:8}}>🔗 Invita a tus amigos</div>
          <div style={{display:"flex",gap:8}}>

              flex:1, background:"rgba(255,255,255,0.06)", border:`1px solid ${C.border}`,

        {/* Players */}

            <div style={{fontWeight:700,fontSize:15}}>👥 Jugadores ({realCount}/{MAX_PLAYERS - botCount})</div>

              <Tag color={C.purple}>{botCount} bot{botCount>1?"s":""} 🤖</Tag>
            )}

          <PlayersList players={players} hostId={roomData?.hostId}/>
        </Card>

        {/* Start button (host only) */}
        {isHost ? (
          <Btn size="lg" style={{width:"100%"}} onClick={onStart}

              ? "⏳ Esperando jugadores..."

        )}
      </div>
    </div>

}

// ─── TEMA ────────────────────────────────────────────────────
function TemaScreen({ roomCode, roomData, myId, isHost, onBack }) {
  const [selCategory, setSelCategory] = useState(null);
  const [altOffset, setAltOffset]     = useState(0);
  const [loading, setLoading]         = useState(false);

  function getTopics(cat) {
    const topics = cat.topics;
    const start  = (altOffset * 8) % topics.length;
    const slice  = [];
    for (let i = 0; i < 8; i++) slice.push(topics[(start + i) % topics.length]);
    return slice;
  }

  async function selectTema(tema) {
    if (!isHost) return;
    setLoading(true);
    await window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.NOMINAR, tema });
    setLoading(false);
  }

  if (!isHost) {
    return (
      <FullscreenCenter>
        <GlobalStyles/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:12}}>⏳</div>
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:8}}>El host está eligiendo el tema</h2>
          <p style={{color:C.textSm}}>Aguanta un momento...</p>
          <div style={{marginTop:20,animation:"pulse 2s infinite",color:C.purpleLt}}>●●●</div>
        </div>
      </FullscreenCenter>
    );
  }

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.purple}22 0%, transparent 60%), ${C.bg}`

      <GlobalStyles/>
      <div style={{width:"100%",maxWidth:480}}>

        {/* Back */}
        <button onClick={onBack} style={{
          display:"flex",alignItems:"center",gap:6,
          background:"transparent",border:"none",cursor:"pointer",
          color:C.textSm,fontSize:13,marginBottom:16,padding:"4px 0"
        }}>← Lobby</button>

        <div className="fadeIn" style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:42,marginBottom:6}}>🎯</div>
          <h2 style={{fontSize:28,fontWeight:900}}>Elige el tema</h2>
          <p style={{color:C.textSm,marginTop:6}}>¿De qué van a armar su Mount Rushmore?</p>
        </div>

        {!selCategory ? (
          /* Category selection */
          <div style={{display:"flex",flexDirection:"column",gap:12}} className="fadeIn">

// ─── NOMINAR ─────────────────────────────────────────────────────
function NominarScreen({ roomCode, roomData, myId, onBack }) {
  const tema = roomData?.tema || "";
  const myNoms = (roomData?.nominations?.[myId] || []);
  const allNoms = roomData?.nominations || {};
  const players = roomData?.players || {};
  const [inputs, setInputs]   = useState(["","","",""]);
  const [saving, setSaving]   = useState(false);
  const [done, setDone]       = useState(false);
  const isHost = roomData?.hostId === myId;

  // Initialize from Firebase if already saved
  useEffect(() => {
    if (myNoms.length > 0) {
      const arr = [...myNoms];
      while (arr.length < 4) arr.push("");
      setInputs(arr.slice(0,4));
      setDone(true);
    }
  }, []);

  const allDone = Object.keys(players).every(pid => allNoms[pid]?.filter(Boolean).length >= 4);

  function updateInput(i, val) {
    const n = [...inputs]; n[i] = val; setInputs(n);
  }

  async function submitNoms() {
    const valid = inputs.filter(s=>s.trim());
    if (valid.length < 4) return;
    setSaving(true);
    await window.db.ref(`rooms/${roomCode}/nominations/${myId}`).set(inputs.map(s=>s.trim()));
    setDone(true);
    setSaving(false);
  }

  function advanceToArgs() {
    window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.ARGUMENTOS });
  }

  const playerCount = Object.keys(players).length;
  const doneCount = Object.keys(allNoms).filter(pid => allNoms[pid]?.filter(Boolean).length >= 4).length;

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.purple}22 0%, transparent 60%), ${C.bg}`
    }}>
      <GlobalStyles/>
      <div style={{width:"100%",maxWidth:480}}>

        <button onClick={onBack} style={{
          display:"flex",alignItems:"center",gap:6,
          background:"transparent",border:"none",cursor:"pointer",
          color:C.textSm,fontSize:13,marginBottom:16,padding:"4px 0"
        }}>← Volver al lobby</button>

        <div className="fadeIn" style={{textAlign:"center",marginBottom:24}}>
          <Tag color={C.purple} style={{marginBottom:8}}>Fase 1 • Picks</Tag>
          <h2 style={{fontSize:26,fontWeight:900,marginTop:8}}>📝 Tus 4 picks</h2>
          <p style={{color:C.purpleLt,marginTop:4,fontWeight:600,fontSize:16}}>
            Tema: {tema}
          </p>
        </div>

        {/* Progress */}
        <Card style={{marginBottom:16}} className="fadeIn">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.textMd,fontSize:13}}>Jugadores listos</span>
            <span style={{fontWeight:700,color:doneCount===playerCount?C.green:C.gold}}>
              {doneCount}/{playerCount}
            </span>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:6,height:6}}>
            <div style={{
              background:`linear-gradient(90deg,${C.purple},${C.pink})`,
              height:"100%", borderRadius:6, width:`${(doneCount/playerCount)*100}%`,
              transition:"width 0.4s"
            }}/>
          </div>
        </Card>

        {/* Input form */}
        {!done ? (
          <Card className="fadeIn" style={{marginBottom:16}}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{marginBottom:10}}>
                <input
                  value={inputs[i]}
                  onChange={e=>updateInput(i,e.target.value)}
                  placeholder={`Pick #${i+1}`}
                  style={{
                    width:"100%", background:"rgba(255,255,255,0.07)", border:`1px solid ${C.border}`,
                    borderRadius:12, padding:"11px 16px", color:C.text, fontSize:14, outline:"none"
                  }}
                  maxLength={60}
                />
              </div>
            ))}
            <Btn size="lg" style={{width:"100%",marginTop:4}} onClick={submitNoms}
              disabled={inputs.filter(s=>s.trim()).length < 4 || saving}>
              {saving ? <Spinner/> : "✅ Confirmar picks"}
            </Btn>
          </Card>
        ) : (
          <Card className="fadeIn" style={{marginBottom:16}}>
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:32}}>✅</div>
              <div style={{fontWeight:700,marginTop:4}}>¡Picks enviados!</div>
              <div style={{color:C.textSm,fontSize:13,marginTop:2}}>Esperando a los demás...</div>
            </div>
            {myNoms.map((n,i) => (
              <div key={i} style={{
                background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"9px 14px",
                marginBottom:6,fontWeight:600,fontSize:14,
                display:"flex",alignItems:"center",gap:10
              }}>
                <span style={{color:C.purpleLt}}>#{i+1}</span> {n}
              </div>
            ))}
          </Card>
        )}

        {/* Host advance */}
        {isHost && allDone && (
          <Btn size="lg" style={{width:"100%"}} onClick={advanceToArgs} className="fadeIn">
            ➡️ Todos listos · Siguiente fase
          </Btn>
        )}
      </div>
    </div>
  );
}

// ─── ARGUMENTOS ──────────────────────────────────────────────────
function ArgumentosScreen({ roomCode, roomData, myId, onBack }) {

  const [saving, setSaving] = useState(false);

    const existing = existingArgs[myId];
    if (existing && existing.some(Boolean)) {
      const arr = [...existing];
      while (arr.length < 4) arr.push("");
      setArgs(arr.slice(0,4));

    window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.REVEAL, revealIdx: -1 });

  return (

      minHeight:"100vh", display:"flex", flexDirection:"column",

      background:`radial-gradient(ellipse at 50% 0%, ${C.blue}22 0%, transparent 60%), ${C.bg}`

        {/* Progress */}

                  rows={2}
                  style={{
                    width:"100%", background:"rgba(255,255,255,0.07)", border:`1px solid ${C.border}`,
                    borderRadius:10, padding:"9px 12px", color:C.text, fontSize:13,

// ─── REVEAL ──────────────────────────────────────────────────
function RevealScreen({ roomCode, roomData, myId, isHost, onBack }) {
  const nominations = roomData?.nominations || {};
  const argData     = roomData?.arguments   || {};
  const players     = roomData?.players     || {};
  const tema        = roomData?.tema        || "";
  const [visibleCount, setVisibleCount] = useState(0);

  // Group picks by player: [{ player, picks:[{nom,arg}] }]
  const playerBlocks = Object.entries(players)
    .sort((a,b) => (a[1].joinedAt||0) - (b[1].joinedAt||0))
    .map(([pid, player]) => ({
      pid, player,
      picks: (nominations[pid]||[]).map((nom,i) => ({
        nom, arg: argData?.[pid]?.[i]||""
      })).filter(p => p.nom)
    }))
    .filter(b => b.picks.length > 0);

  const totalBlocks = playerBlocks.length;

  useEffect(() => {
    if (visibleCount >= totalBlocks) return;
    const t = setTimeout(() => setVisibleCount(c => c + 1), visibleCount === 0 ? 800 : 1200);
    return () => clearTimeout(t);
  }, [visibleCount, totalBlocks]);

  function advance() {
    window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.VETO });
  }

  const allVisible = visibleCount >= totalBlocks;

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.pink}22 0%, transparent 60%), ${C.bg}`
    }}>
      <GlobalStyles/>
      <div style={{width:"100%",maxWidth:520}}>

        {/* Back */}
        <button onClick={onBack} style={{
          display:"flex",alignItems:"center",gap:6,
          background:"transparent",border:"none",cursor:"pointer",
          color:C.textSm,fontSize:13,marginBottom:16,padding:"4px 0"
        }}>← Volver</button>

        <div className="fadeIn" style={{textAlign:"center",marginBottom:24}}>
          <Tag color={C.pink}>Fase 3 • Reveal</Tag>
          <h2 style={{fontSize:26,fontWeight:900,marginTop:8}}>🎭 Picks de todos los jugadores</h2>
          <p style={{color:"#FBCFE8",marginTop:4,fontWeight:500}}>{tema}</p>
        </div>

        {/* Player blocks — appear sequentially */}
        <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:20}}>
          {playerBlocks.map((block, bi) => (
            bi < visibleCount ? (
              <Card key={block.pid} className="popIn" style={{
                border:`1px solid ${block.player.color}44`,
                boxShadow:`0 0 20px ${block.player.color}22`
              }}>
                {/* Player header */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <Avatar emoji={block.player.emoji} color={block.player.color} size={40}/>
                  <div>
                    <div style={{fontWeight:800,fontSize:15}}>{block.player.name}</div>
                    <div style={{fontSize:11,color:C.textSm}}>4 picks</div>
                  </div>
                </div>
                {/* 4 picks grid */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {block.picks.map((pick,pi) => (
                    <div key={pi} style={{
                      background:"rgba(255,255,255,0.05)",borderRadius:10,
                      padding:"10px 12px",border:`1px solid ${block.player.color}22`
                    }}>
                      <div style={{
                        fontSize:10,color:C.textSm,fontWeight:600,marginBottom:4,
                        textTransform:"uppercase",letterSpacing:0.5
                      }}>Pick {pi+1}</div>
                      <div style={{fontWeight:700,fontSize:13,color:C.text,lineHeight:1.3}}>{pick.nom}</div>
                      {pick.arg && (
                        <div style={{
                          fontSize:11,color:C.textSm,marginTop:6,fontStyle:"italic",lineHeight:1.4
                        }}>"{pick.arg}"</div>
                      )}
                    </div>
                  ))}
                </div>
              </Card>
            ) : (
              <div key={block.pid} style={{
                height:80, borderRadius:16,
                background:"rgba(255,255,255,0.03)",
                border:`1px dashed ${C.border}`,
                display:"flex",alignItems:"center",justifyContent:"center"
              }}>
                <div style={{color:C.textSm,fontSize:13,animation:"pulse 1.5s infinite"}}>
                  {block.player.emoji} Revelando...
                </div>
              </div>
            )
          ))}
        </div>

        {/* Advance button — appears when all revealed */}
        {allVisible && isHost && (
          <Btn size="lg" style={{width:"100%"}} onClick={advance} className="fadeIn">
            🚫 Pasar a Veto →
          </Btn>
        )}
        {allVisible && !isHost && (
          <div style={{
            textAlign:"center",color:C.textSm,fontSize:14,padding:16,
            background:"rgba(255,255,255,0.04)",borderRadius:12,border:`1px solid ${C.border}`
          }}>
            <div style={{animation:"pulse 2s infinite"}}>⏳ Esperando que el host avance...</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── VETO ────────────────────────────────────────────────────────
function VetoScreen({ roomCode, roomData, myId }) {
  const nominations = roomData?.nominations || {};
  const players     = roomData?.players     || {};
  const vetoes      = roomData?.vetoes      || {};
  const isHost      = roomData?.hostId === myId;
  const myVeto      = vetoes[myId];
  const [saving, setSaving] = useState(false);
  const [timeLeft, setTimeLeft] = useState(20);
  const timedOut = useRef(false);

  useEffect(() => {
    if (myVeto) return; // already voted
    if (timeLeft <= 0) {
      if (!timedOut.current) {
        timedOut.current = true;
        // Auto-advance if host and everyone timed out
        window.db.ref(`rooms/${roomCode}/vetoes/${myId}`).set({ pid:"_timeout", idx:-1, nom:"" });
      }
      return;
    }
    const t = setTimeout(() => setTimeLeft(l => l-1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, myVeto]);


  // All picks except mine
  const otherPicks = [];
  Object.entries(nominations).forEach(([pid, noms]) => {
    if (pid === myId) return;
    (noms||[]).forEach((nom,i) => {
      if (nom) otherPicks.push({ pid, nom, idx:i,
        playerName: players[pid]?.name||"?",
        playerEmoji: players[pid]?.emoji||"😎",
        playerColor: players[pid]?.color||C.purple,
      });
    });
  });

  const playerCount = Object.keys(players).length;
  const vetoCount   = Object.keys(vetoes).length;
  const allDone     = vetoCount >= playerCount;

  async function castVeto(pick) {
    if (myVeto || saving) return;
    setSaving(true);
    await window.db.ref(`rooms/${roomCode}/vetoes/${myId}`).set({
      pid: pick.pid, idx: pick.idx, nom: pick.nom
    });
    setSaving(false);
  }

  function advance() {
    window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.VOTAR });
  }

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.red}22 0%, transparent 60%), ${C.bg}`
    }}>
      <GlobalStyles/>
      <div style={{width:"100%",maxWidth:480}}>

        <div className="fadeIn" style={{textAlign:"center",marginBottom:24}}>
          <Tag color={C.red}>Fase 4 • Veto</Tag>
          <h2 style={{fontSize:26,fontWeight:900,marginTop:8}}>🚫 Lanza tu Veto</h2>
          <p style={{color:"#FCA5A5",marginTop:4}}>Elimina el pick de alguien más</p>
        </div>

        {/* Progress */}
        {/* Timer */}
        {!myVeto && (
          <div style={{
            display:"flex",alignItems:"center",justifyContent:"center",gap:10,
            marginTop:12,marginBottom:4
          }}>
            <div style={{
              width:56,height:56,borderRadius:"50%",
              border:`3px solid ${timeLeft <= 5 ? C.red : C.gold}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontWeight:900,fontSize:22,
              color:timeLeft <= 5 ? C.red : C.gold,
              transition:"color 0.3s,border-color 0.3s"
            }}>{timeLeft}</div>
            <span style={{color:C.textSm,fontSize:13}}>segundos para vetar</span>
          </div>
        )}

        <Card style={{marginBottom:16}} className="fadeIn">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.textMd,fontSize:13}}>Vetos lanzados</span>
            <span style={{fontWeight:700,color:vetoCount===playerCount?C.green:C.gold}}>
              {vetoCount}/{playerCount}
            </span>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:6,height:6}}>
            <div style={{
              background:`linear-gradient(90deg,${C.red},${C.pink})`,
              height:"100%", borderRadius:6, width:`${(vetoCount/playerCount)*100}%`,
              transition:"width 0.4s"
            }}/>
          </div>
        </Card>

        {myVeto ? (
          <Card className="fadeIn" style={{marginBottom:16,textAlign:"center",border:`1px solid ${C.red}44`}}>
            <div style={{fontSize:36,marginBottom:8}}>🚫</div>
            <div style={{fontWeight:700,fontSize:15}}>Vetaste: {myVeto.nom}</div>
            <div style={{color:C.textSm,fontSize:13,marginTop:4}}>
              de {players[myVeto.pid]?.name || "?"}
            </div>
          </Card>
        ) : (
          <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {otherPicks.length === 0 ? (
              <Card style={{textAlign:"center",color:C.textSm}}>
                No hay picks de otros jugadores todavía
              </Card>
            ) : (
              otherPicks.map((p,i) => (
                <Card key={i} style={{cursor:saving?"not-allowed":"pointer",
                  border:`1px solid ${p.playerColor}33`,
                  transition:"all 0.15s"
                }}
                onClick={()=>castVeto(p)}
                onMouseEnter={e=>e.currentTarget.style.boxShadow=`0 0 20px ${C.red}44`}
                onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}
                >
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <Avatar emoji={p.playerEmoji} color={p.playerColor} size={40}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{p.nom}</div>
                      <div style={{color:C.textSm,fontSize:12,marginTop:2}}>por {p.playerName}</div>
                    </div>
                    <div style={{color:C.red,fontSize:22}}>🚫</div>
                  </div>
                </Card>
              ))
            )}
          </div>
        )}

        {isHost && (
          <Btn size="lg" variant={allDone?"primary":"secondary"} style={{width:"100%"}} onClick={advance} className="fadeIn">
            {allDone ? "🗳️ Ir a votar →" : "⏭️ Saltar a votar"}
          </Btn>
        )}
      </div>
    </div>
  );
}

// ─── VOTAR ────────────────────────────────────────────────────────
function VotarScreen({ roomCode, roomData, myId }) {
  const nominations = roomData?.nominations || {};
  const vetoes      = roomData?.vetoes      || {};
  const players     = roomData?.players     || {};
  const allVotes    = roomData?.votes       || {};
  const isHost      = roomData?.hostId === myId;
  const [myVotes, setMyVotes] = useState([]);
  const [saving, setSaving]   = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [timeLeft, setTimeLeft] = useState(40);

  useEffect(() => {
    if (submitted) return;
    if (timeLeft <= 0) {
      // Time's up — advance phase if host
      if (roomData?.hostId === myId) {
        window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.FINAL });
      }
      return;
    }
    const t = setTimeout(() => setTimeLeft(l => l-1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, submitted]);


  // Build surviving picks (minus vetoed ones)
  const survivingPicks = [];
  Object.entries(nominations).forEach(([pid, noms]) => {
    (noms||[]).forEach((nom, idx) => {
      if (!nom) return;
      const isVetoed = Object.values(vetoes).some(v => v.pid===pid && v.idx===idx);
      if (!isVetoed) {
        survivingPicks.push({ pid, nom, idx,
          playerName: players[pid]?.name||"?",
          playerEmoji: players[pid]?.emoji||"😎",
          playerColor: players[pid]?.color||C.purple,
        });
      }
    });
  });

  // Can't vote for own picks
  const votablePicks = survivingPicks.filter(p => p.pid !== myId);

  useEffect(() => {
    if (allVotes[myId]) {
      setMyVotes(allVotes[myId]);
      setSubmitted(true);
    }
  }, []);

  function toggleVote(key) {
    if (submitted) return;
    const keyStr = `${key.pid}_${key.idx}`;
    setMyVotes(prev => {
      const already = prev.includes(keyStr);
      if (already) return prev.filter(v=>v!==keyStr);
      if (prev.length >= MAX_VOTES) return prev;
      return [...prev, keyStr];
    });
  }

  async function submitVotes() {
    if (myVotes.length === 0 || saving) return;
    setSaving(true);
    await window.db.ref(`rooms/${roomCode}/votes/${myId}`).set(myVotes);
    setSubmitted(true);
    setSaving(false);
  }

  function advance() {
    window.db.ref(`rooms/${roomCode}`).update({ phase: PHASE.FINAL });
  }

  const playerCount   = Object.keys(players).length;
  const votedCount    = Object.keys(allVotes).length;
  const allVotesDone  = votedCount >= playerCount;

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.gold}22 0%, transparent 60%), ${C.bg}`
    }}>
      <GlobalStyles/>
      <div style={{width:"100%",maxWidth:480}}>

        <div className="fadeIn" style={{textAlign:"center",marginBottom:24}}>
          <Tag color={C.gold}>Fase 5 • Votar</Tag>
          <h2 style={{fontSize:26,fontWeight:900,marginTop:8}}>🗳️ Elige los mejores</h2>
          <p style={{color:"#FDE68A",marginTop:4}}>Vota por máx {MAX_VOTES} picks (no el tuyo)</p>
        </div>

        {/* Progress */}
        {/* Timer */}
        {!submitted && (
          <div style={{
            display:"flex",alignItems:"center",justifyContent:"center",gap:10,
            marginTop:12,marginBottom:4
          }}>
            <div style={{
              width:56,height:56,borderRadius:"50%",
              border:`3px solid ${timeLeft <= 10 ? C.red : C.blue}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontWeight:900,fontSize:22,
              color:timeLeft <= 10 ? C.red : C.blue,
              transition:"color 0.3s,border-color 0.3s"
            }}>{timeLeft}</div>
            <span style={{color:C.textSm,fontSize:13}}>segundos para votar</span>
          </div>
        )}

        <Card style={{marginBottom:16}} className="fadeIn">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.textMd,fontSize:13}}>Votos enviados</span>
            <span style={{fontWeight:700,color:votedCount===playerCount?C.green:C.gold}}>
              {votedCount}/{playerCount}
            </span>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:6,height:6}}>
            <div style={{
              background:`linear-gradient(90deg,${C.gold},${C.pink})`,
              height:"100%",borderRadius:6,width:`${(votedCount/playerCount)*100}%`,transition:"width 0.4s"
            }}/>
          </div>
        </Card>

        <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {votablePicks.map((p, i) => {
            const key = `${p.pid}_${p.idx}`;
            const isVoted = myVotes.includes(key);
            return (
              <div key={i} onClick={()=>toggleVote(p)}
                style={{
                  background:isVoted?`${C.gold}22`:"rgba(255,255,255,0.06)",
                  border:`1px solid ${isVoted?C.gold:C.border}`,
                  borderRadius:14, padding:"12px 16px", cursor:submitted?"default":"pointer",
                  display:"flex", alignItems:"center", gap:12, transition:"all 0.15s"
                }}>
                <Avatar emoji={p.playerEmoji} color={p.playerColor} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{p.nom}</div>
                  <div style={{color:C.textSm,fontSize:12,marginTop:2}}>por {p.playerName}</div>
                </div>
                <div style={{
                  width:28,height:28,borderRadius:"50%",
                  border:`2px solid ${isVoted?C.gold:"rgba(255,255,255,0.2)"}`,
                  background:isVoted?C.gold:"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:14,transition:"all 0.15s"
                }}>
                  {isVoted && "✓"}
                </div>
              </div>
            );
          })}
        </div>

        {!submitted ? (
          <Btn size="lg" style={{width:"100%"}} onClick={submitVotes}
            disabled={myVotes.length===0||saving} className="fadeIn">
            {saving ? <Spinner/> : `✅ Votar (${myVotes.length}/${MAX_VOTES})`}
          </Btn>
        ) : (
          <Card className="fadeIn" style={{textAlign:"center",marginBottom:12}}>
            <div style={{fontSize:28,marginBottom:4}}>✅</div>
            <div style={{fontWeight:700}}>¡Votos enviados!</div>
            <div style={{color:C.textSm,fontSize:13,marginTop:4}}>Esperando a los demás...</div>
          </Card>
        )}

        {isHost && (
          <Btn size="lg" variant={allVotesDone?"primary":"secondary"} style={{width:"100%",marginTop:10}}
            onClick={advance} className="fadeIn">
            {allVotesDone ? "🏆 Ver resultados →" : "⏭️ Saltar a resultados"}
          </Btn>
        )}
      </div>
    </div>
  );
}

// ─── FINAL ────────────────────────────────────────────────────────
function FinalScreen({ roomCode, roomData, myId }) {
  const nominations = roomData?.nominations || {};
  const vetoes      = roomData?.vetoes      || {};
  const players     = roomData?.players     || {};
  const allVotes    = roomData?.votes       || {};
  const tema        = roomData?.tema        || "?";
  const [shared, setShared] = useState(false);

  // Count votes per pick
  const voteMap = {};
  Object.values(allVotes).forEach(playerVoteArr => {
    (playerVoteArr||[]).forEach(key => {
      voteMap[key] = (voteMap[key]||0) + 1;
    });
  });

  // Build surviving picks with vote counts
  const picks = [];
  Object.entries(nominations).forEach(([pid, noms]) => {
    (noms||[]).forEach((nom, idx) => {
      if (!nom) return;
      const isVetoed = Object.values(vetoes).some(v => v.pid===pid && v.idx===idx);
      if (!isVetoed) {
        const key = `${pid}_${idx}`;
        picks.push({ pid, nom, idx, votes: voteMap[key]||0,
          playerName: players[pid]?.name||"?",
          playerEmoji: players[pid]?.emoji||"😎",
          playerColor: players[pid]?.color||C.purple,
        });
      }
    });
  });

  picks.sort((a,b)=>b.votes-a.votes);
  const top4 = picks.slice(0,4);

  // Scoring: calculate points per player
  const scores = {};
  Object.keys(players).forEach(pid => { scores[pid] = 0; });

  // 2 pts: pick survived veto
  Object.entries(nominations).forEach(([pid, noms]) => {
    (noms||[]).forEach((nom,idx) => {
      if (!nom) return;
      const survived = !Object.values(vetoes).some(v => v.pid===pid && v.idx===idx);
      if (survived) scores[pid] = (scores[pid]||0) + 2;
    });
  });

  // 3 pts: pick coincides with another player's nomination
  const allNoms = {};
  Object.values(nominations).forEach(noms => {
    (noms||[]).forEach(nom => {
      if (nom) allNoms[nom.toLowerCase().trim()] = (allNoms[nom.toLowerCase().trim()]||0) + 1;
    });
  });
  Object.entries(nominations).forEach(([pid, noms]) => {
    (noms||[]).forEach(nom => {
      if (nom && (allNoms[nom.toLowerCase().trim()]||0) > 1) {
        scores[pid] = (scores[pid]||0) + 3;
      }
    });
  });

  // 5 pts: pick is in top 4
  top4.forEach(p => { scores[p.pid] = (scores[p.pid]||0) + 5; });

  // Write scores to Firebase (cumulative)
  useEffect(() => {
    if (!roomCode) return;
    const updates = {};
    Object.entries(scores).forEach(([pid, pts]) => {
      updates[`rooms/${roomCode}/scores/${pid}`] = pts;
    });
    window.db.ref().update(updates);
  }, []);


  function playAgain() {
    window.db.ref(`rooms/${roomCode}`).update({
      phase: PHASE.TEMA, tema:"", revealIdx:-1,
      nominations:{}, arguments:{}, vetoes:{}, votes:{}, chat:{}
    });
  }

  function shareResult() {
    const text = `🏔️ Mount Rushmore: ${tema}\n${top4.map((p,i)=>
      `${["🥇","🥈","🥉","🏅"][i]} ${p.nom}`
    ).join("\n")}\n\n¡Juega ROMA RUSH!`;
    navigator.share ? navigator.share({title:"ROMA RUSH",text}) :
      navigator.clipboard.writeText(text).then(()=>setShared(true));
  }

  const isHost = roomData?.hostId === myId;

  return (
    <div style={{
      minHeight:"100vh", display:"flex", flexDirection:"column",
      alignItems:"center", padding:"30px 20px",
      background:`radial-gradient(ellipse at 50% 0%, ${C.gold}33 0%, transparent 60%), ${C.bg}`
    }}>
      <GlobalStyles/>
      <Confetti/>

      <div style={{width:"100%",maxWidth:480}}>
        <div className="fadeIn" style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52}}>🏔️</div>
          <h2 style={{
            fontSize:32, fontWeight:900, marginTop:8,
            background:`linear-gradient(135deg,${C.gold},${C.pink})`,
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"
          }}>¡Mount Rushmore!</h2>
          <p style={{color:"#FDE68A",marginTop:4,fontWeight:600,fontSize:16}}>{tema}</p>
        </div>

        {/* Scores */}
        <Card className="fadeIn" style={{marginBottom:16}}>
          <div style={{fontWeight:700,marginBottom:10}}>🏆 Puntuación de esta ronda</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {Object.entries(scores)
              .sort((a,b)=>b[1]-a[1])
              .map(([pid,pts]) => {
                const pl = players[pid];
                if (!pl) return null;
                return (
                  <div key={pid} style={{
                    display:"flex",alignItems:"center",gap:10,
                    background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px"
                  }}>
                    <Avatar emoji={pl.emoji} color={pl.color} size={32}/>
                    <div style={{flex:1,fontWeight:600,fontSize:14}}>{pl.name}</div>
                    <div style={{
                      background:`${C.gold}22`,border:`1px solid ${C.gold}44`,
                      borderRadius:8,padding:"4px 12px",fontWeight:800,color:C.gold,fontSize:16
                    }}>{pts}</div>
                  </div>
                );
              })
            }
          </div>
        </Card>

        {/* Top 4 */}
        <div className="fadeIn" style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {top4.map((p,i) => (
            <Card key={i} style={{
              border:`1px solid ${i===0?C.gold:C.border}`,
              boxShadow:i===0?`0 0 30px ${C.gold}44`:"none",
            }}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:28}}>
                  {["🥇","🥈","🥉","🏅"][i]}
                </div>
                <Avatar emoji={p.playerEmoji} color={p.playerColor} size={44}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:16}}>{p.nom}</div>
                  <div style={{color:C.textSm,fontSize:12,marginTop:2}}>por {p.playerName}</div>
                </div>
                <div style={{
                  background:i===0?C.gold+"33":"rgba(255,255,255,0.08)",
                  border:`1px solid ${i===0?C.gold:C.border}`,
                  borderRadius:10, padding:"6px 12px", textAlign:"center"
                }}>
                  <div style={{fontWeight:800,fontSize:18,color:i===0?C.gold:C.text}}>
                    {p.votes}
                  </div>
                  <div style={{fontSize:10,color:C.textSm}}>votos</div>
                </div>
              </div>
            </Card>
          ))}
        </div>

        {/* Players */}
        <Card className="fadeIn" style={{marginBottom:16}}>
          <div style={{fontWeight:700,marginBottom:10}}>👥 Jugadores</div>
          <PlayersList players={players} hostId={roomData?.hostId}/>
        </Card>

        {/* Actions */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Btn size="lg" variant="gold" style={{width:"100%"}} onClick={shareResult}>
            {shared ? "✅ ¡Copiado!" : "📤 Compartir resultado"}
          </Btn>
          {isHost && (
            <Btn size="lg" variant="secondary" style={{width:"100%"}} onClick={playAgain}>
              🔄 Jugar otra ronda
            </Btn>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function RomaRush() {
  const myId      = getMyPlayerId();
  const [roomCode, setRoomCode]   = useState(null);
  const [roomData, setRoomData]   = useState(null);
  const [chatOpen, setChatOpen]   = useState(false);
  const [unread, setUnread]       = useState(0);
  const prevChatLen = useRef(0);

  // Listen to room changes
  useEffect(() => {
    if (!roomCode) return;
    const ref = window.db.ref(`rooms/${roomCode}`);
    ref.on("value", snap => {
      setRoomData(snap.val());
    });
    return () => ref.off();
  }, [roomCode]);

  // Deep link on load
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const sala = params.get("sala");
    if (sala) setRoomCode(sala.toUpperCase());
  }, []);

  // Unread chat badge
  useEffect(() => {
    if (!roomData?.chat) return;
    const len = Object.keys(roomData.chat).length;
    if (!chatOpen && len > prevChatLen.current) {
      setUnread(u => u + (len - prevChatLen.current));
    }
    prevChatLen.current = len;
  }, [roomData?.chat, chatOpen]);

  // ─── BOT AUTO-PLAY ──────────────────────────────────────────────
  useEffect(() => {
    if (!roomData || !roomCode) return;
    const phase   = roomData.phase;
    const players = roomData.players || {};
    const tema    = roomData.tema    || "";
    if (roomData.hostId !== myId) return; // only host drives bots

    const bots = Object.values(players).filter(p => p.isBot);
    if (bots.length === 0) return;

    const timers = [];

    if (phase === PHASE.NOMINAR) {
      const noms = roomData.nominations || {};
      bots.forEach(bot => {
        if ((noms[bot.pid]||[]).filter(Boolean).length >= 4) return;
        const t = setTimeout(async () => {
          const s = await window.db.ref(`rooms/${roomCode}/nominations/${bot.pid}`).once("value");
          if (s.exists() && (s.val()||[]).filter(Boolean).length >= 4) return;
          const picks = generateBotPicks(tema);
          await window.db.ref(`rooms/${roomCode}/nominations/${bot.pid}`).set(picks);
        }, 2000 + Math.random() * 3000);
        timers.push(t);
      });
    }

    if (phase === PHASE.ARGUMENTOS) {
      const existArgs = roomData.arguments   || {};
      const noms      = roomData.nominations || {};
      bots.forEach(bot => {
        if ((existArgs[bot.pid]||[]).some(Boolean)) return;
        const t = setTimeout(async () => {
          const s = await window.db.ref(`rooms/${roomCode}/arguments/${bot.pid}`).once("value");
          if (s.exists() && (s.val()||[]).some(Boolean)) return;
          const botNoms = noms[bot.pid] || ["","","",""];
          const tema = roomData?.tema || "";
          const botArgs = botNoms.map(nom => getBotArg(tema, nom));
          await window.db.ref(`rooms/${roomCode}/arguments/${bot.pid}`).set(botArgs);
        }, 2000 + Math.random() * 3000);
        timers.push(t);
      });
    }

    if (phase === PHASE.VETO) {
      const vetoes = roomData.vetoes        || {};
      const noms   = roomData.nominations   || {};
      bots.forEach(bot => {
        if (vetoes[bot.pid]) return;
        const t = setTimeout(async () => {
          const s = await window.db.ref(`rooms/${roomCode}/vetoes/${bot.pid}`).once("value");
          if (s.exists()) return;
          const otherPicks = [];
          Object.entries(noms).forEach(([pid, pnoms]) => {
            if (pid === bot.pid) return;
            (pnoms||[]).forEach((nom, i) => {
              if (nom) otherPicks.push({ pid, idx:i, nom });
            });
          });
          if (otherPicks.length === 0) return;
          const pick = otherPicks[Math.floor(Math.random() * otherPicks.length)];
          await window.db.ref(`rooms/${roomCode}/vetoes/${bot.pid}`).set({
            pid: pick.pid, idx: pick.idx, nom: pick.nom
          });
        }, 1500 + Math.random() * 3000);
        timers.push(t);
      });
    }

    if (phase === PHASE.VOTAR) {
      const allVotes = roomData.votes        || {};
      const noms     = roomData.nominations  || {};
      const vetoes   = roomData.vetoes       || {};
      bots.forEach(bot => {
        if (allVotes[bot.pid]) return;
        const t = setTimeout(async () => {
          const s = await window.db.ref(`rooms/${roomCode}/votes/${bot.pid}`).once("value");
          if (s.exists()) return;
          const surviving = [];
          Object.entries(noms).forEach(([pid, pnoms]) => {
            (pnoms||[]).forEach((nom, idx) => {
              if (!nom) return;
              const vetoed = Object.values(vetoes).some(v => v.pid===pid && v.idx===idx);
              if (!vetoed && pid !== bot.pid) surviving.push(`${pid}_${idx}`);
            });
          });
          if (surviving.length === 0) return;
          const shuffled = [...surviving].sort(() => Math.random() - 0.5);
          const picks    = shuffled.slice(0, Math.min(MAX_VOTES, shuffled.length));
          await window.db.ref(`rooms/${roomCode}/votes/${bot.pid}`).set(picks);
        }, 2000 + Math.random() * 3000);
        timers.push(t);
      });
    }

    return () => timers.forEach(clearTimeout);
  }, [roomData?.phase, roomCode]);

  async function createRoom(name, emoji, color, numPlayers) {
    const code = genRoomCode();
    const realCount = numPlayers || 1;
    const botCount  = MAX_PLAYERS - realCount;

    // Build players object: real host + bots
    const players = {
      [myId]: { pid:myId, name, emoji, color, joinedAt:Date.now() }
    };
    for (let i = 0; i < botCount; i++) {
      const botId = `bot_${i}_${Date.now()}`;
      players[botId] = {
        pid: botId,
        name:  BOT_NAMES[i]  || `Bot ${i+1}`,
        emoji: BOT_EMOJIS[i] || "🤖",
        color: BOT_COLORS[i] || "#6366F1",
        joinedAt: Date.now() + i + 1,
        isBot: true
      };
    }

    await window.db.ref(`rooms/${code}`).set({
      phase: PHASE.LOBBY,
      hostId: myId,
      tema: "",
      revealIdx: -1,
      createdAt: Date.now(),
      botCount,
      players
    });
    window.history.pushState({}, "", `?sala=${code}`);
    setRoomCode(code);
  }

  async function joinRoom(code, name, emoji, color) {
    const snap = await window.db.ref(`rooms/${code}`).once("value");
    if (!snap.exists()) return { error:"Sala no encontrada 😅" };
    const data = snap.val();
    const playerCount = Object.keys(data.players||{}).length;
    if (playerCount >= MAX_PLAYERS) return { error:`La sala está llena (máx ${MAX_PLAYERS})` };
    await window.db.ref(`rooms/${code}/players/${myId}`).set({
      pid:myId, name, emoji, color, joinedAt:Date.now()
    });
    window.history.pushState({}, "", `?sala=${code}`);
    setRoomCode(code);
    return {};
  }

  const isHost = roomData?.hostId === myId;
  const phase  = roomData?.phase || PHASE.HOME;
  const players = roomData?.players || {};
  const myPlayer = players[myId];

  // Show home if no room or loading
  if (!roomCode || (!roomData && roomCode)) {
    // If room code in URL but no data yet, show loading
    if (roomCode && !roomData) {
      return (
        <FullscreenCenter>
          <div style={{textAlign:"center"}}>
            <Spinner/>
            <div style={{marginTop:12,color:C.textSm}}>Conectando...</div>
          </div>
        </FullscreenCenter>
      );
    }
    return <HomeScreen onCreateRoom={createRoom} onJoinRoom={joinRoom}/>;
  }

  // If room exists but player is not in it yet (joining via link)
  if (roomData && !myPlayer && phase !== PHASE.HOME) {
    return <HomeScreen onCreateRoom={createRoom} onJoinRoom={async(code,name,emoji,color)=>{
      const res = await joinRoom(code,name,emoji,color);
      return res;
    }}/>;
  }

  // Chat overlay button (shows in all phases except home)
  const ChatBtn = (
    <button onClick={()=>{setChatOpen(o=>!o);setUnread(0);}} style={{
      position:"fixed", bottom:20, right:20, zIndex:100,
      width:52, height:52, borderRadius:"50%",
      background:`linear-gradient(135deg,${C.purple},${C.pink})`,
      border:"none", cursor:"pointer", fontSize:22,
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
      display:"flex",alignItems:"center",justifyContent:"center"
    }}>
      💬
      {unread > 0 && (
        <span style={{
          position:"absolute", top:-4, right:-4,
          background:C.red, color:"#fff", borderRadius:"50%",
          width:20, height:20, fontSize:11, fontWeight:700,
          display:"flex",alignItems:"center",justifyContent:"center"
        }}>{unread}</span>
      )}
    </button>
  );

  // Chat panel overlay
  const ChatOverlay = chatOpen && (
    <div style={{
      position:"fixed", bottom:80, right:16, zIndex:200,
      width:300, height:420,
      background:"#1A1033", border:`1px solid ${C.border}`,
      borderRadius:20, overflow:"hidden",
      boxShadow:"0 8px 40px rgba(0,0,0,0.7)",
      display:"flex", flexDirection:"column"
    }}>
      <div style={{
        padding:"12px 16px", borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center"
      }}>
        <span style={{fontWeight:700,fontSize:14}}>💬 Chat</span>
        <button onClick={()=>setChatOpen(false)} style={{
          background:"none",border:"none",color:C.textSm,cursor:"pointer",fontSize:18
        }}>×</button>
      </div>
      <ChatPanel
        roomCode={roomCode} myId={myId}
        myName={myPlayer?.name||"?"} myEmoji={myPlayer?.emoji||"😎"}
        myColor={myPlayer?.color||C.purple}
      />
    </div>
  );

  // Phase routing
  const renderPhase = () => {
    switch(phase) {
      case PHASE.LOBBY:
        return (
          <LobbyScreen
            roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost}
            onStart={()=>window.db.ref(`rooms/${roomCode}`).update({phase:PHASE.TEMA})}
            onBack={() => { window.history.pushState({}, "", "/"); setRoomCode(""); }}
          />
        );
      case PHASE.TEMA:
        return <TemaScreen roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost}
          onBack={() => isHost && window.db.ref(`rooms/${roomCode}`).update({phase: PHASE.LOBBY})}
        />;
      case PHASE.NOMINAR:
        return <NominarScreen roomCode={roomCode} roomData={roomData} myId={myId}
          onBack={() => isHost && window.db.ref(`rooms/${roomCode}`).update({phase: PHASE.TEMA})}
        />;
      case PHASE.ARGUMENTOS:
        return <ArgumentosScreen roomCode={roomCode} roomData={roomData} myId={myId}
          onBack={() => isHost && window.db.ref(`rooms/${roomCode}`).update({phase: PHASE.NOMINAR})}
        />;
      case PHASE.REVEAL:
        return <RevealScreen roomCode={roomCode} roomData={roomData} myId={myId} isHost={isHost}
          onBack={() => isHost && window.db.ref(`rooms/${roomCode}`).update({phase: PHASE.ARGUMENTOS})}
        />;
      case PHASE.VETO:
        return <VetoScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;
      case PHASE.VOTAR:
        return <VotarScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;
      case PHASE.FINAL:
        return <FinalScreen roomCode={roomCode} roomData={roomData} myId={myId}/>;
      default:
        return <HomeScreen onCreateRoom={createRoom} onJoinRoom={joinRoom}/>;
    }
  };

  return (
    <>
      {renderPhase()}
      {ChatBtn}
      {ChatOverlay}
    </>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<RomaRush/>);

</script>
</body>
</html>
